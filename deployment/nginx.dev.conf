worker_processes 1;
error_log /dev/stderr;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Rate limiting for webhooks
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;
    
    # Upstream definitions
    upstream fastapi {
        server 127.0.0.1:8000;
        keepalive 32;
    }
    
    upstream nextjs {
        server 127.0.0.1:3000;
    }
    
    server {
        listen 8080;
        server_name _;
        
        # === SIMPLIFIED ROUTING - No basePath, everything at root ===
        
        # === PUBLIC ROUTES (No Auth Required) ===
        
        # GitHub webhooks
        location ~ ^/api/webhook/ {
            limit_req zone=webhook_limit burst=10 nodelay;
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            
            # Buffer settings for webhook payloads
            proxy_buffers 8 16k;
            proxy_buffer_size 16k;
            client_max_body_size 10M;
        }
        
        # === GRAPH API (heavy build, needs longer timeout) ===
        location /api/domain-graph {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "keep-alive";

            # Graph builds can take minutes on cold start
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            proxy_buffers 4 32k;
            proxy_buffer_size 8k;
        }

        # === SSE ENDPOINTS (Server-Sent Events) ===

        # === MCP SERVER (Claude Code graph access) ===

        # MCP SSE endpoint — long-lived event stream
        location /api/mcp/ {
            # `/api/mcp/` fronts mutation-capable MCP tools (update_signal,
            # graph_add_node, graph_delete_node, ...) with no application-layer
            # auth, so the surface is gated here by source IP.
            #
            # In this deployment the host nginx (tailscale vhost) terminates
            # the Tailscale TLS connection and proxies to 127.0.0.1:<devport>
            # on the container — which means $remote_addr as seen inside the
            # container is always the Docker bridge gateway (172.x.x.1), not
            # the real caller. We use the realip module to replace
            # $remote_addr with the host nginx's X-Real-IP header *before*
            # allow/deny runs, so the allowlist below evaluates against the
            # real Tailscale caller IP.
            #
            # set_real_ip_from must list every hop we trust to set X-Real-IP.
            # The broader 172.16/12 covers any Docker bridge renumbering; the
            # effective trust boundary is that only the host nginx can reach
            # this port on 127.0.0.1 of the host.
            set_real_ip_from 172.16.0.0/12;
            real_ip_header X-Real-IP;

            allow 127.0.0.1;
            allow ::1;
            allow 100.64.0.0/10;   # Tailscale CGNAT — dev-tailnet only
            allow 172.16.0.0/12;   # Docker bridge gateway — direct host loopback to 127.0.0.1:<DEV_PORT> (e.g. Claude Code reading .mcp.json)
            deny all;

            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';

            # SSE requirements
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            chunked_transfer_encoding off;
            add_header X-Accel-Buffering "no" always;
        }

        # === AUTHENTICATED ROUTES ===

        # Auth routes go to FastAPI backend
        location /auth/ {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "keep-alive";
            
            # Standard timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings
            proxy_buffers 4 32k;
            proxy_buffer_size 16k;
        }
        
        # All API routes go to FastAPI backend
        location /api/ {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "keep-alive";
            
            # Standard timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings
            proxy_buffers 4 32k;
            proxy_buffer_size 8k;
            client_max_body_size 50M;
        }
        
        # WebSocket support for API
        location /api/ws {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        
        # === FRONTEND ROUTES ===
        
        # Static files (images, etc.)
        location /static/ {
            alias /app/;
            try_files $uri =404;
            add_header Cache-Control "public, max-age=3600";
        }
        
        # Next.js static files (_next directory)
        location ~ ^/_next/ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "keep-alive";
            
            # Cache static assets
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        
        # Everything else goes to Next.js
        location / {
            add_header X-Nginx-Route "nextjs-root" always;
            
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "keep-alive";
            
            # Next.js specific
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Prevent caching of HTML pages
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Health check endpoint
        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }
    }
}