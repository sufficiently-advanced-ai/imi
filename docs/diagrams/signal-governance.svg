  <text x="240.0" y="302.5" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="13" font-weight="normal" fill="#1e1e1e" text-anchor="middle">agent behavior (judge policy hits)</text>
