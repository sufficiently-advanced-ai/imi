  <text x="240.0" y="441.4" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="13" font-weight="normal" fill="#1e1e1e" text-anchor="middle">· superseded</text>
  <text x="195.0" y="180.4" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="13" font-weight="bold" fill="#2f9e44" text-anchor="start">HUMAN review: confirm</text>
  <text x="195.0" y="199.6" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="12" font-weight="normal" fill="#868e96" text-anchor="start">(update_signal review_action,</text>
  <text x="195.0" y="215.6" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="12" font-weight="normal" fill="#868e96" text-anchor="start">audited, append-only JSONL)</text>
  <text x="245.0" y="527.1" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="13" font-weight="normal" fill="#1e1e1e" text-anchor="middle">invariant: agents can NEVER mint instruction-grade</text>
  <text x="245.0" y="543.4" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="13" font-weight="normal" fill="#1e1e1e" text-anchor="middle">memory — enforced at write, review, and recall</text>
  <text x="810.0" y="12.8" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="16" font-weight="bold" fill="#1e1e1e" text-anchor="middle">Temporal axis (computed at read time)</text>
