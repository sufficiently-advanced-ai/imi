  <text x="970.0" y="168.4" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="13" font-weight="normal" fill="#1e1e1e" text-anchor="middle">(SUPERSEDES edge)</text>
  <text x="970.0" y="262.1" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Marker Felt', cursive" font-size="13" font-weight="normal" fill="#1e1e1e" text-anchor="middle">conflicting</text>
