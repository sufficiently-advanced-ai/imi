services:
  neo4j:
    image: neo4j:5.26-community
    container_name: "${INSTANCE_NAME:-imi}-neo4j"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-dev-password-2024}
      - NEO4J_PLUGINS=["graph-data-science"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_dbms_security_procedures_unrestricted=gds.*
    volumes:
      - neo4j-data:/data
    ports:
      - "127.0.0.1:${NEO4J_BROWSER_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-dev-password-2024}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - default

  app:
    container_name: "${INSTANCE_NAME:-imi}-dev"
    image: "${INSTANCE_NAME:-imi}"
    depends_on:
      neo4j:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        # No basePath for dev builds - runs at root
        - NEXT_PUBLIC_BASE_PATH=
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_AUTH_MODE=demo
    ports:
      # Each instance gets a unique port, e.g., imi=8081, example-demo=8082
      - "127.0.0.1:${DEV_PORT:-8081}:8080"
    environment:
      # Git configuration
      - GIT_REPO_URL=${GIT_REPO_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REPO_NAME=${REPO_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-imi-bot@example.com}
      - GIT_USER_NAME=${GIT_USER_NAME:-imi Bot}
      
      # API Keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      
      # Instance identification
      - INSTANCE_NAME=${INSTANCE_NAME:-imi}
      # No basePath needed - runs at root
      
      
      # Domain configuration
      - DOMAIN_CONFIG_DIR=/app/config/domains
      - ACTIVE_DOMAIN=${ACTIVE_DOMAIN:-consulting_firm}

      # Neo4j configuration
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-dev-password-2024}
      - NEO4J_REBUILD_ON_STARTUP=${NEO4J_REBUILD_ON_STARTUP:-true}

      # Auth mode (demo for dev)
      - NEXT_PUBLIC_AUTH_MODE=demo
      # Demo mode for video recording features (Epic #783) — set DEMO_MODE=true in .env to enable
      - DEMO_MODE=${DEMO_MODE:-false}
      # Deployment mode: 'full' (all features) or 'kb' (knowledge-only)
      # For demo mode, redirect URI doesn't matter but needs to be set
      
      # OpenTelemetry configuration (optional)
      - OTEL_SERVICE_NAME=${INSTANCE_NAME:-imi}-dev
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_SERVICE_INSTANCE_ID=${INSTANCE_NAME:-imi}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT:-http://observability-otel-collector:4318}
      - OTEL_TRACES_EXPORTER=${OTEL_TRACES_EXPORTER:-otlp}
      - OTEL_METRICS_EXPORTER=${OTEL_METRICS_EXPORTER:-otlp}

      # Tailscale admin interface configuration
      - TAILSCALE_AUTHKEY=${TAILSCALE_AUTHKEY:-}
      - TAILSCALE_ADMIN_ENABLED=${TAILSCALE_ADMIN_ENABLED:-false}
      - ADMIN_READ_ONLY=${ADMIN_READ_ONLY:-false}
      
    volumes:
      - ./repo:/app/repo
      # - ./app:/app/app:ro  # Mount app code read-only for development monitoring - DISABLED to allow image code updates
      # Frontend is built during Docker build, not mounted
      - ./config:/app/config:ro  # Mount config read-only
      - ./demo/fixtures:/app/demo/fixtures:ro  # Mount demo fixtures for video recording
      - ./data:/app/data  # Database persistence directory
      - tailscale-state:/var/lib/tailscale  # Persist Tailscale identity
      # Mount Claude Code subscription credentials from host (read-only)
      # This enables dev container to use subscription auth instead of API billing
      - /root/.claude/.credentials.json:/root/.claude/.credentials.json:ro
    restart: unless-stopped
    networks:
      - default
      - observability_observability-network

networks:
  observability_observability-network:
    external: true

volumes:
  neo4j-data:
    name: ${INSTANCE_NAME:-imi}-neo4j-data
  tailscale-state:
    name: ${INSTANCE_NAME:-imi}-tailscale-state