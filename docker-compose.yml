# imi — community docker-compose
# Usage:
#   cp .env.example .env
#   # Edit .env: set ANTHROPIC_API_KEY and NEO4J_PASSWORD
#   docker compose up -d
#
# App runs at http://localhost:8080 with AUTH_MODE=none (no auth wall).

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: imi-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required — set it in .env}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    volumes:
      - neo4j-data:/data
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 20s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  app:
    container_name: imi-app
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_AUTH_MODE=none
    ports:
      - "127.0.0.1:${PORT:-8080}:8080"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      # Required
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required — set it in .env}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD is required — set it in .env}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}

      # App mode
      - AUTH_MODE=${AUTH_MODE:-none}
      - NEXT_PUBLIC_AUTH_MODE=${AUTH_MODE:-none}

      # Git corpus (optional — omit for file-upload-only mode)
      - GIT_REPO_URL=${GIT_REPO_URL:-}
      - GITHUB_ACCESS_TOKEN=${GITHUB_ACCESS_TOKEN:-}
      - GIT_BRANCH=${GIT_BRANCH:-main}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-imi-bot@example.com}
      - GIT_USER_NAME=${GIT_USER_NAME:-imi Bot}

      # Domain
      - ACTIVE_DOMAIN=${ACTIVE_DOMAIN:-consulting_firm}
      - DOMAIN_CONFIG_DIR=/app/config/domains

      # Vector store backend (faiss | sqlite | pgvector)
      - VECTOR_BACKEND=${VECTOR_BACKEND:-sqlite}

      # AI models (defaults to Claude Sonnet / Haiku)
      - CLAUDE_SONNET_MODEL=${CLAUDE_SONNET_MODEL:-claude-sonnet-4-5-20250929}
      - CLAUDE_HAIKU_MODEL=${CLAUDE_HAIKU_MODEL:-claude-haiku-4-5-20251001}

      # Optional observability
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      - ./repo:/app/repo
      - ./data:/app/data
      - ./config:/app/config:ro
    restart: unless-stopped

volumes:
  neo4j-data:
    name: imi-neo4j-data
