# Prometheus configuration for development telemetry monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # Add alerting rules here if needed

scrape_configs:
  # imi API metrics
  - job_name: 'imi-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/api/metrics'
    scrape_interval: 10s

  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']